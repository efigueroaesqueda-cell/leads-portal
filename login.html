<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HenryLeads — Iniciar sesión</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0d;--bg2:#141414;--bg3:#1a1a1a;--border:#2a2a2a;--border2:#333;--gold:#c8a951;--gold2:#a07820;--text:#e8e8e8;--text2:#aaa;--text3:#666;--red:#e74c3c}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;color:var(--text)}
body{display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(circle at 20% 15%, rgba(200,169,81,.14), transparent 45%),
    radial-gradient(circle at 82% 88%, rgba(160,120,32,.12), transparent 45%),
    var(--bg);}
.card{width:100%;max-width:370px;background:var(--bg2);border:1px solid var(--border2);border-radius:18px;padding:38px 32px;margin:16px;box-shadow:0 20px 60px rgba(0,0,0,.45);animation:cardIn .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes cardIn{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
.logo{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#111;margin:0 auto 18px;box-shadow:0 6px 20px rgba(200,169,81,.35)}
h1{font-size:20px;font-weight:800;text-align:center;margin-bottom:4px;letter-spacing:.2px}
.sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:26px}
label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;margin-top:16px;font-weight:600}
input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:9px;padding:11px 12px;color:var(--text);font-size:14px;transition:border-color .18s ease,box-shadow .18s ease}
input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,169,81,.12)}
.pass-wrap{position:relative}
.pass-wrap input{padding-right:44px}
.eye-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:32px;height:32px;border:none;background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:7px;margin:0;padding:0;transition:color .15s ease,background .15s ease}
.eye-btn:hover{color:var(--gold);background:var(--bg2)}
.eye-btn:active{transform:translateY(-50%) scale(.88)}
button[type=submit]{width:100%;margin-top:26px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111;border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;transition:box-shadow .2s ease,transform .12s cubic-bezier(.4,0,.2,1)}
button[type=submit]:hover{box-shadow:0 6px 20px rgba(200,169,81,.4)}
button[type=submit]:active{transform:scale(.97)}
button[type=submit]:disabled{opacity:.6;cursor:default;box-shadow:none;transform:none}
.error{margin-top:14px;font-size:13px;color:var(--red);text-align:center;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">C</div>
  <h1>HenryLeads</h1>
  <div class="sub">Cremalleras LR — Portal de leads</div>
  <form id="loginForm">
    <label for="usuario">Usuario</label>
    <input type="text" id="usuario" autocomplete="username" required autofocus>
    <label for="password">Contraseña</label>
    <div class="pass-wrap">
      <input type="password" id="password" autocomplete="current-password" required>
      <button type="button" class="eye-btn" id="eyeBtn" onclick="togglePassword()" title="Mostrar contraseña" aria-label="Mostrar contraseña">
        <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.06 21.06 0 0 1 5.06-6.06M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.32 21.32 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
    </div>
    <button type="submit" id="btnEntrar">Entrar</button>
    <div class="error" id="errorMsg"></div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://bgpugtgjbfseqwwcwpyd.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJncHVndGdqYmZzZXF3d2N3cHlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NjM4MjEsImV4cCI6MjA5ODEzOTgyMX0.iYp-y00qYWv9uvJX73eAASeKy5qbonXN3Jbwd4qRxPM';
const sbAuth = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Si ya hay sesion activa, no mostrar el login
sbAuth.auth.getSession().then(({ data }) => {
  if (data.session) location.href = 'index.html';
});

function togglePassword(){
  const inp = document.getElementById('password');
  const btn = document.getElementById('eyeBtn');
  const ahoraVisible = inp.type === 'password'; // tras el cambio quedará visible
  inp.type = ahoraVisible ? 'text' : 'password';
  btn.title = ahoraVisible ? 'Ocultar contraseña' : 'Mostrar contraseña';
  // Ojo NORMAL = visible ; ojo TACHADO (con diagonal) = oculto
  document.getElementById('eyeIcon').innerHTML = ahoraVisible
    ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
    : '<path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.06 21.06 0 0 1 5.06-6.06M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.32 21.32 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
}

function usuarioToEmail(usuario){
  usuario = usuario.trim();
  return usuario.includes('@') ? usuario : `${usuario.toLowerCase()}@henryleads.internal`;
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errorMsg = document.getElementById('errorMsg');
  const btn = document.getElementById('btnEntrar');
  errorMsg.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Entrando...';

  const email = usuarioToEmail(document.getElementById('usuario').value);
  const password = document.getElementById('password').value;

  const { error } = await sbAuth.auth.signInWithPassword({ email, password });

  if (error) {
    errorMsg.textContent = 'Usuario o contraseña incorrectos.';
    errorMsg.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Entrar';
    return;
  }

  location.href = 'index.html';
});
</script>
</body>
</html>
