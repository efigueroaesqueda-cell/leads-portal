<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--bg2:#141414;--bg3:#1a1a1a;--bg4:#222;
  --border:#2a2a2a;--border2:#333;
  --gold:#c8a951;--gold2:#a07820;
  --text:#e8e8e8;--text2:#aaa;--text3:#666;
  --green:#2ecc71;--red:#e74c3c;--blue:#3498db;--orange:#f39c12;
  --header-h:56px;
}
:root[data-tema="claro"]{
  --bg:#ffffff;--bg2:#f7f7f8;--bg3:#f0f0f2;--bg4:#e5e5e8;
  --border:#e4e4e7;--border2:#d4d4d9;
  --gold:#a97e2f;--gold2:#8a6425;
  --text:#18181b;--text2:#52525b;--text3:#8b8b93;
}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;transition:background .2s,color .2s}
#app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
#sidenav{width:56px;min-width:56px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:4px;z-index:10}
.snav-logo{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#111;margin-bottom:8px;cursor:pointer}
.snav-btn{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all .18s cubic-bezier(.4,0,.2,1);border:none;background:transparent;color:var(--text2);text-decoration:none;position:relative}
.snav-btn:hover{background:var(--bg4);color:var(--text)}
.snav-btn:active{transform:scale(.9)}
.snav-btn.active{background:rgba(200,169,81,.15);color:var(--gold)}
@keyframes tourPulse{
  0%{box-shadow:0 0 0 0 rgba(200,169,81,.7)}
  70%{box-shadow:0 0 0 9px rgba(200,169,81,0)}
  100%{box-shadow:0 0 0 0 rgba(200,169,81,0)}
}
.snav-btn.pulse-attention{color:var(--gold);animation:tourPulse 1.8s infinite}
#tour-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300}
#tour-backdrop.show{display:block}
#tour-highlight{display:none;position:fixed;z-index:301;border:2px solid var(--gold);border-radius:10px;box-shadow:0 0 0 4000px rgba(0,0,0,.55);pointer-events:none;transition:all .25s ease}
#tour-highlight.show{display:block}
#tour-tooltip{display:none;position:fixed;z-index:302;background:var(--bg2);border:1px solid var(--gold);border-radius:12px;padding:16px;width:280px;box-shadow:0 12px 32px rgba(0,0,0,.5);transition:all .25s ease}
#tour-tooltip.show{display:block}
.tour-step-count{font-size:11px;color:var(--gold);font-weight:700;margin-bottom:6px}
.tour-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px}
.tour-text{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:14px}
.tour-actions{display:flex;align-items:center;justify-content:space-between;gap:8px}
.tour-skip{font-size:11px;color:var(--text3);cursor:pointer;background:none;border:none;padding:0}
.tour-skip:hover{color:var(--text2)}
.tour-nav{display:flex;gap:6px}
.tour-btn{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none}
.tour-btn-prev{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.tour-btn-next{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111}
.snav-sep{width:30px;height:1px;background:var(--border);margin:4px 0}
.snav-bottom{margin-top:auto}
.tooltip{position:absolute;left:60px;top:50%;transform:translateY(-50%);background:#222;border:1px solid var(--border2);padding:4px 10px;border-radius:6px;font-size:11px;color:var(--text);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:50}
.snav-btn:hover .tooltip{opacity:1}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
.page-header{height:var(--header-h);border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
.page-header h1{font-size:16px;font-weight:700;flex:1}
.header-stats{display:flex;gap:16px}
.stat{text-align:center}
.stat-num{font-size:18px;font-weight:800;color:var(--gold)}
.stat-label{font-size:10px;color:var(--text3)}
.btn-icon{width:30px;height:30px;border-radius:8px;background:var(--bg4);border:1px solid var(--border2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .18s cubic-bezier(.4,0,.2,1)}
.btn-icon:hover{color:var(--text)}

/* FILTERS BAR */
.filters-bar{padding:10px 20px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;flex-wrap:wrap;gap:8px;align-items:center;flex-shrink:0}
.filter-chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:grab;white-space:nowrap;border:1px solid var(--border2);background:transparent;color:var(--text2);transition:all .18s cubic-bezier(.4,0,.2,1);user-select:none}
.filter-chip:active{cursor:grabbing}
.filter-chip.dragging{opacity:.4}
.filter-chip:hover,.filter-chip.active{border-color:var(--gold);color:var(--gold);background:rgba(200,169,81,.1)}
.filters-bar select{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-size:12px;padding:5px 10px;cursor:pointer;outline:none}
.filters-bar select:focus{border-color:var(--gold)}

/* KANBAN */
#kanban{flex:1;display:flex;gap:0;overflow-x:auto;padding:16px;gap:12px}
#kanban::-webkit-scrollbar{height:6px}
#kanban::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.kanban-col{min-width:240px;width:240px;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.kanban-col.dragging{opacity:.4}
.col-header{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);flex-shrink:0;cursor:grab;user-select:none}
.col-header:active{cursor:grabbing}
.col-icono{font-size:16px}
.col-nombre{font-size:13px;font-weight:700;flex:1}
.col-count{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--bg4)}
.col-action{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);cursor:pointer;flex-shrink:0}
.col-action:hover{background:var(--bg4);color:var(--text)}
.col-body{flex:1;display:flex;flex-direction:column;gap:8px;overflow-y:auto;padding:4px 2px;border-radius:8px;transition:background .15s}
.col-body::-webkit-scrollbar{width:3px}
.col-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.col-body.drop-target{background:rgba(200,169,81,.08);outline:2px dashed var(--gold)}
.kanban-col-add{min-width:120px;width:120px;flex-shrink:0;display:flex;align-items:flex-start;padding-top:2px}
.btn-add-etapa{width:100%;padding:10px 8px;border-radius:10px;background:transparent;border:1px dashed var(--border2);color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;transition:all .18s cubic-bezier(.4,0,.2,1)}
.btn-add-etapa:hover{color:var(--gold);border-color:var(--gold)}

/* LEAD CARD */
.lead-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:grab;transition:all .18s cubic-bezier(.4,0,.2,1);position:relative}
.lead-card:active{cursor:grabbing}
.lead-card.dragging-card{opacity:.3}
.drag-ghost{position:fixed;pointer-events:none;z-index:200;opacity:.95;box-shadow:0 10px 30px rgba(0,0,0,.6);transform:rotate(-2deg);cursor:grabbing;margin:0}
.lead-card:hover{border-color:var(--border2);background:var(--bg3);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.card-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#111;float:left;margin-right:8px;flex-shrink:0}
.card-name{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-phone{font-size:11px;color:var(--text3);margin-top:1px}
.card-clear{clear:both;padding-top:6px}
.card-preview{font-size:11px;color:var(--text2);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:6px}
.card-footer{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.tipo-icon{font-size:10px;padding:1px 5px;border-radius:4px;font-weight:700}
.tipo-mecanico{background:rgba(39,174,96,.2);color:#2ecc71}
.tipo-refaccionaria{background:rgba(52,152,219,.2);color:#3498db}
.tipo-usuario{background:rgba(149,165,166,.15);color:#aaa}
.card-asesor{font-size:10px;color:var(--text3);margin-left:auto}
.card-time{font-size:10px;color:var(--text3)}
.card-unread{background:var(--green);color:#111;font-size:9px;font-weight:700;border-radius:8px;padding:1px 5px;position:absolute;top:8px;right:8px}

/* DEMO BANNER */
#demo-banner{background:rgba(200,169,81,.08);border-bottom:1px solid rgba(200,169,81,.2);padding:5px 16px;text-align:center;font-size:11px;color:var(--gold);font-weight:600}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:30px;flex-direction:column;gap:10px;color:var(--text3)}
.spinner{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:24px;width:480px;max-width:95vw;max-height:85vh;overflow-y:auto;animation:modalIn .22s cubic-bezier(.34,1.56,.64,1)}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px}
.modal-actions{display:flex;gap:10px;margin-top:16px;justify-content:flex-end}
.btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:box-shadow .18s ease,border-color .15s ease,color .15s ease,transform .12s cubic-bezier(.4,0,.2,1)}
.btn:active{transform:scale(.96)}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-ghost:hover{border-color:var(--text2);color:var(--text)}
.modal-section{margin-bottom:16px}
.modal-section label{display:block;font-size:11px;color:var(--text2);font-weight:600;margin-bottom:5px}
.modal-section input,.modal-section select,.modal-section textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;font-family:inherit}
.modal-section input:focus,.modal-section select:focus{border-color:var(--gold)}
.badge-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.badge{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid}
</style>
</head>

      <div class="snav-btn" id="btn-demo" onclick="toggleDemo()"><span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6"/><path d="M10 3v6.5L4.5 19a2 2 0 0 0 1.7 3h11.6a2 2 0 0 0 1.7-3L14 9.5V3"/><path d="M7 15h10"/></svg></span><span class="tooltip">Demo</span></div>

<!-- MODAL LEAD DETAIL -->
<div class="modal-overlay" id="modal-lead" style="display:none" onclick="if(event.target===this)closeModal()">

      <div id="ml-avatar" style="width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#111;flex-shrink:0"></div>

function showTourStep(){

function positionTour(el, step){
  const r=el.getBoundingClientRect();
  const hl=document.getElementById('tour-highlight');
  hl.style.left=(r.left-6)+'px';
  hl.style.top=(r.top-6)+'px';
  hl.style.width=(r.width+12)+'px';
  hl.style.height=(r.height+12)+'px';
  hl.classList.add('show');

  const tip=document.getElementById('tour-tooltip');
  const tw=280, gap=14;
  const th=tip.offsetHeight||160;
  let left, top;
  if(step.pos==='right'){ left=r.right+gap; top=r.top; }
  else if(step.pos==='left'){ left=r.left-tw-gap; top=r.top; }
  else if(step.pos==='bottom'){ left=r.left; top=r.bottom+gap; }
  else { left=r.left; top=r.top-th-gap; }
  left=Math.max(10, Math.min(left, window.innerWidth-tw-10));
  top=Math.max(10, Math.min(top, window.innerHeight-th-10));
  tip.style.left=left+'px';
  tip.style.top=top+'px';
}

  if(_tourIndex>=TOUR_STEPS.length-1){ endTour(); return; }

function prevTourStep(){

// ── ARRASTRAR LEADS ENTRE COLUMNAS ───────────────────────────
function attachCardDrag(){
  document.querySelectorAll('.lead-card').forEach(card=>{
    // Si soltaste la tarjeta en el mismo lugar de donde la tomaste, el navegador
    // dispara un "click" normal sobre ella (nunca se movió del DOM, solo viste
    // un fantasma siguiendo el mouse) y eso abría la ficha sin que quisieras.
    card.addEventListener('click', (e)=>{
      if(card._justDragged){
        e.stopImmediatePropagation();
        e.preventDefault();
        card._justDragged=false;
      }
    }, true);
    card.addEventListener('pointerdown', (e)=>{
      const startX=e.clientX, startY=e.clientY;
      const pid=e.pointerId;
      let dragging=false, ghost=null;
      const rect=card.getBoundingClientRect();
      const offsetX=startX-rect.left, offsetY=startY-rect.top;
      const onMove=(ev)=>{
        const dx=ev.clientX-startX, dy=ev.clientY-startY;
        if(!dragging && Math.hypot(dx,dy)>8){
          dragging=true;
          card.setPointerCapture(pid);
          card.classList.add('dragging-card');
          ghost=card.cloneNode(true);
          ghost.classList.add('drag-ghost');
          ghost.style.width=rect.width+'px';
          ghost.style.left=(startX-offsetX)+'px';
          ghost.style.top=(startY-offsetY)+'px';
          document.body.appendChild(ghost);
        }
        if(!dragging) return;
        ghost.style.left=(ev.clientX-offsetX)+'px';
        ghost.style.top=(ev.clientY-offsetY)+'px';
        document.querySelectorAll('.col-body').forEach(cb=>cb.classList.remove('drop-target'));
        const el=document.elementFromPoint(ev.clientX, ev.clientY);
        const colBody=el?.closest('.col-body');
        if(colBody) colBody.classList.add('drop-target');
      };
      const onUp=(ev)=>{
        document.removeEventListener('pointermove', onMove);
        document.removeEventListener('pointerup', onUp);
        document.querySelectorAll('.col-body').forEach(cb=>cb.classList.remove('drop-target'));
        ghost?.remove();
        card.classList.remove('dragging-card');
        if(dragging){
          card.releasePointerCapture(pid);
          card._justDragged=true;
          const el=document.elementFromPoint(ev.clientX, ev.clientY);
          const colBody=el?.closest('.col-body');
          if(colBody) moveLeadToEtapa(card.dataset.leadId, colBody.dataset.etapaId);
        }
      };
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
    });
  });
}

function moveLeadToEtapa(leadId, etapaId){
  const lead=_leads.find(l=>l.id===leadId);
  const etapa=_etapas.find(e=>e.id===etapaId);
  if(!lead||!etapa||lead.etapa?.id===etapa.id) return;
  lead.etapa=etapa;
  renderKanban();
  showToast(`✅ Movido a "${etapa.nombre}"`);
}

// ── ARRASTRAR PARA REORDENAR COLUMNAS ────────────────────────
function attachColumnDrag(){
  document.querySelectorAll('.col-header').forEach(header=>{
    header.addEventListener('pointerdown', (e)=>{
      if(e.target.closest('.col-action')) return;
      const item=header.closest('.kanban-col');
      const startX=e.clientX, startY=e.clientY;
      const pid=e.pointerId;
      let dragging=false;
      const onMove=(ev)=>{
        const dx=ev.clientX-startX, dy=ev.clientY-startY;
        if(!dragging && Math.hypot(dx,dy)>8){
          dragging=true;
          header.setPointerCapture(pid);
          item.classList.add('dragging');
        }
        if(!dragging) return;
        const siblings=[...document.querySelectorAll('.kanban-col')].filter(i=>i!==item);
        for(const sib of siblings){
          const r=sib.getBoundingClientRect();
          if(ev.clientX>r.left && ev.clientX<r.right){
            if(ev.clientX<r.left+r.width/2) item.parentNode.insertBefore(item, sib);
            else item.parentNode.insertBefore(item, sib.nextSibling);
            break;
          }
        }
      };
      const onUp=()=>{
        document.removeEventListener('pointermove', onMove);
        document.removeEventListener('pointerup', onUp);
        if(dragging){
          header.releasePointerCapture(pid);
          item.classList.remove('dragging');
          const ids=[...document.querySelectorAll('.kanban-col')].map(c=>c.dataset.etapaId);
          const newOrder=ids.map(id=>_etapas.find(e=>e.id===id)).filter(Boolean);
          newOrder.forEach((e,i)=>e.orden=i+1);
          _etapas=newOrder;
        }
      };
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
    });
  });
}

// ── CREAR / RENOMBRAR / BORRAR EMBUDOS ───────────────────────
function promptNewEtapa(){
  const nombre=prompt('Nombre del nuevo embudo:');
  if(!nombre||!nombre.trim()) return;
  const colores=['#888888','#3498db','#9b59b6','#f39c12','#1abc9c','#2ecc71','#e74c3c','#e67e22'];
  const nueva={ id:'et-'+Date.now(), nombre:nombre.trim().toUpperCase(), color:colores[_etapas.length%colores.length], icono:'📌', orden:_etapas.length+1 };
  _etapas.push(nueva);
  renderKanban();
  showToast('✅ Embudo creado');
}

function renameEtapa(id){
  const etapa=_etapas.find(e=>e.id===id);
  if(!etapa) return;
  const nombre=prompt('Nuevo nombre del embudo:', etapa.nombre);
  if(!nombre||!nombre.trim()) return;
  etapa.nombre=nombre.trim().toUpperCase();
  renderKanban();
  showToast('✅ Embudo renombrado');
}

function deleteEtapa(id){
  if(_etapas.length<=1){ showToast('❌ Debe quedar al menos un embudo'); return; }
  const etapa=_etapas.find(e=>e.id===id);
  if(!etapa) return;
  const leadsEnEtapa=_leads.filter(l=>l.etapa?.id===id);
  const otras=_etapas.filter(e=>e.id!==id);
  if(leadsEnEtapa.length){
    const opciones=otras.map((e,i)=>`${i+1}. ${e.nombre}`).join('\n');
    const resp=prompt(`"${etapa.nombre}" tiene ${leadsEnEtapa.length} lead(s). ¿A cuál embudo los movemos?\n\n${opciones}\n\nEscribe el número:`);
    const idx=parseInt(resp)-1;
    if(isNaN(idx)||!otras[idx]){ showToast('❌ Cancelado, no se borró el embudo'); return; }
    leadsEnEtapa.forEach(l=> l.etapa=otras[idx]);
  } else {
    if(!confirm(`¿Seguro que quieres borrar el embudo "${etapa.nombre}"? Está vacío, pero esta acción no se puede deshacer.`)){
      showToast('Cancelado, no se borró el embudo');
      return;
    }
  }
  _etapas=otras;
  renderKanban();
  showToast('✅ Embudo borrado');
}

// ── ARRASTRAR PARA REORDENAR CHIPS DE FILTRO ─────────────────
function attachChipDrag(){
  const container=document.querySelector('.filters-bar');
  if(!container) return;
  container.querySelectorAll('.filter-chip').forEach(chip=>{
    chip.addEventListener('pointerdown', (e)=>{
      const startX=e.clientX, startY=e.clientY;
      const pid=e.pointerId;
      let dragging=false;
      const onMove=(ev)=>{
        const dx=ev.clientX-startX, dy=ev.clientY-startY;
        if(!dragging && Math.hypot(dx,dy)>8){
          dragging=true;
          chip.setPointerCapture(pid);
          chip.classList.add('dragging');
        }
        if(!dragging) return;
        const siblings=[...container.querySelectorAll('.filter-chip')].filter(i=>i!==chip);
        for(const sib of siblings){
          const r=sib.getBoundingClientRect();
          if(ev.clientX>r.left && ev.clientX<r.right){
            if(ev.clientX<r.left+r.width/2) container.insertBefore(chip, sib);
            else container.insertBefore(chip, sib.nextSibling);
            break;
          }
        }
      };
      const onUp=()=>{
        document.removeEventListener('pointermove', onMove);
        document.removeEventListener('pointerup', onUp);
        if(dragging){
          chip.releasePointerCapture(pid);
          chip.classList.remove('dragging');
        }
      };
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
    });
  });
}

function openLeadModal(id){
  _selectedLead=_leads.find(l=>l.id===id);
  if(!_selectedLead)return;
  const l=_selectedLead;
  const col=avatarColor(l.nombre||l.telefono||'?');
  document.getElementById('ml-avatar').style.background=col;
  document.getElementById('ml-avatar').textContent=initials(l.nombre||l.telefono);
  document.getElementById('ml-name').textContent=l.nombre||'Sin nombre';
  document.getElementById('ml-phone').textContent=l.telefono||'';
  document.getElementById('ml-badges').innerHTML=`
    <span class="badge" style="border-color:${l.etapa?.color||'#888'};color:${l.etapa?.color||'#888'}">${l.etapa?.icono||''} ${l.etapa?.nombre||'—'}</span>
    <span class="badge" style="border-color:#555;color:#aaa">${tipoLabel(l.tipo_cliente)}</span>
    ${l.asesor?.nombre?`<span class="badge" style="border-color:#555;color:#aaa">${ICO_PERSON} ${l.asesor.nombre}</span>`:''}
  `;
  document.getElementById('ml-etapa').innerHTML=_etapas.map(e=>`<option value="${e.id}" ${e.nombre===l.etapa?.nombre?'selected':''}>${e.icono} ${e.nombre}</option>`).join('');
  document.getElementById('ml-asesor').innerHTML='<option value="">Sin asignar</option>'+_asesores.map(a=>`<option value="${a.id}" ${l.asesor?.nombre===a.nombre?'selected':''}>${a.nombre}</option>`).join('');
  document.getElementById('ml-notas').value=l.notas||'';
  document.getElementById('ml-chat-link').href=`index.html?lead=${l.id}${_demo?'&demo=1':''}`;
  document.getElementById('modal-lead').style.display='flex';
}

async function moveLeadStage(){
  if(!_selectedLead)return;
  const etapaId=document.getElementById('ml-etapa').value;
  const asesorId=document.getElementById('ml-asesor').value;
  const notas=document.getElementById('ml-notas').value;
  if(_demo){
    const etapa=_etapas.find(e=>e.id===etapaId);
    if(etapa)_selectedLead.etapa=etapa;
    const asesor=_asesores.find(a=>a.id===asesorId);
    _selectedLead.asesor=asesor?{nombre:asesor.nombre}:null;
    _selectedLead.notas=notas;
    document.getElementById('ml-badges').innerHTML=`
      <span class="badge" style="border-color:${_selectedLead.etapa?.color||'#888'};color:${_selectedLead.etapa?.color||'#888'}">${_selectedLead.etapa?.icono||''} ${_selectedLead.etapa?.nombre||'—'}</span>
      <span class="badge" style="border-color:#555;color:#aaa">${tipoLabel(_selectedLead.tipo_cliente)}</span>
      ${_selectedLead.asesor?.nombre?`<span class="badge" style="border-color:#555;color:#aaa">${ICO_PERSON} ${_selectedLead.asesor.nombre}</span>`:''}
    `;
    renderKanban();
    return;
  }
  try{ await sb(`lp_leads?id=eq.${_selectedLead.id}`,{method:'PATCH',body:JSON.stringify({etapa_id:etapaId,asesor_id:asesorId||null,notas})}); closeModal(); await loadData(); }
  catch(e){console.error(e);}
}

function closeModal(){document.getElementById('modal-lead').style.display='none';}
async function loadData(){init();}

if(_demo)document.getElementById('demo-banner').style.display='block';
requireAuth().then(ok => { if(ok){ init(); attachChipDrag(); } });
</script>
