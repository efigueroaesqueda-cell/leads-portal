<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline — Cremalleras LR</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--bg2:#141414;--bg3:#1a1a1a;--bg4:#222;
  --border:#2a2a2a;--border2:#333;
  --gold:#c8a951;--gold2:#a07820;
  --text:#e8e8e8;--text2:#aaa;--text3:#666;
  --green:#2ecc71;--red:#e74c3c;--blue:#3498db;--orange:#f39c12;
  --header-h:56px;
}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
#app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
#sidenav{width:56px;min-width:56px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:4px;z-index:10}
.snav-logo{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#111;margin-bottom:8px;cursor:pointer}
.snav-btn{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all .15s;border:none;background:transparent;color:var(--text2);text-decoration:none;position:relative}
.snav-btn:hover{background:var(--bg4);color:var(--text)}
.snav-btn.active{background:rgba(200,169,81,.15);color:var(--gold)}
.snav-sep{width:30px;height:1px;background:var(--border);margin:4px 0}
.snav-bottom{margin-top:auto}
.tooltip{position:absolute;left:60px;top:50%;transform:translateY(-50%);background:#222;border:1px solid var(--border2);padding:4px 10px;border-radius:6px;font-size:11px;color:var(--text);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:50}
.snav-btn:hover .tooltip{opacity:1}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
.page-header{height:var(--header-h);border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
.page-header h1{font-size:16px;font-weight:700;flex:1}
.header-stats{display:flex;gap:16px}
.stat{text-align:center}
.stat-num{font-size:18px;font-weight:800;color:var(--gold)}
.stat-label{font-size:10px;color:var(--text3)}
.btn-icon{width:30px;height:30px;border-radius:8px;background:var(--bg4);border:1px solid var(--border2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}
.btn-icon:hover{color:var(--text)}

/* FILTERS BAR */
.filters-bar{padding:10px 20px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;gap:8px;align-items:center;flex-shrink:0}
.filter-chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;border:1px solid var(--border2);background:transparent;color:var(--text2);transition:all .15s}
.filter-chip:hover,.filter-chip.active{border-color:var(--gold);color:var(--gold);background:rgba(200,169,81,.1)}
.filters-bar select{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-size:12px;padding:5px 10px;cursor:pointer;outline:none}
.filters-bar select:focus{border-color:var(--gold)}

/* KANBAN */
#kanban{flex:1;display:flex;gap:0;overflow-x:auto;padding:16px;gap:12px}
#kanban::-webkit-scrollbar{height:6px}
#kanban::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.kanban-col{min-width:240px;width:240px;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.col-header{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);flex-shrink:0}
.col-icono{font-size:16px}
.col-nombre{font-size:13px;font-weight:700;flex:1}
.col-count{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--bg4)}
.col-body{flex:1;display:flex;flex-direction:column;gap:8px;overflow-y:auto;padding:4px 2px}
.col-body::-webkit-scrollbar{width:3px}
.col-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* LEAD CARD */
.lead-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:all .15s;position:relative}
.lead-card:hover{border-color:var(--border2);background:var(--bg3);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.card-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#111;float:left;margin-right:8px;flex-shrink:0}
.card-name{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-phone{font-size:11px;color:var(--text3);margin-top:1px}
.card-clear{clear:both;padding-top:6px}
.card-preview{font-size:11px;color:var(--text2);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:6px}
.card-footer{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.tipo-icon{font-size:10px;padding:1px 5px;border-radius:4px;font-weight:700}
.tipo-mecanico{background:rgba(39,174,96,.2);color:#2ecc71}
.tipo-refaccionaria{background:rgba(52,152,219,.2);color:#3498db}
.tipo-usuario{background:rgba(149,165,166,.15);color:#aaa}
.card-asesor{font-size:10px;color:var(--text3);margin-left:auto}
.card-time{font-size:10px;color:var(--text3)}
.card-unread{background:var(--green);color:#111;font-size:9px;font-weight:700;border-radius:8px;padding:1px 5px;position:absolute;top:8px;right:8px}

/* DEMO BANNER */
#demo-banner{background:rgba(200,169,81,.08);border-bottom:1px solid rgba(200,169,81,.2);padding:5px 16px;text-align:center;font-size:11px;color:var(--gold);font-weight:600}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:30px;flex-direction:column;gap:10px;color:var(--text3)}
.spinner{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:24px;width:480px;max-width:95vw;max-height:85vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px}
.modal-actions{display:flex;gap:10px;margin-top:16px;justify-content:flex-end}
.btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-ghost:hover{border-color:var(--text2);color:var(--text)}
.modal-section{margin-bottom:16px}
.modal-section label{display:block;font-size:11px;color:var(--text2);font-weight:600;margin-bottom:5px}
.modal-section input,.modal-section select,.modal-section textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;font-family:inherit}
.modal-section input:focus,.modal-section select:focus{border-color:var(--gold)}
.badge-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.badge{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid}
</style>
</head>
<body>
<div id="app">
  <!-- SIDEBAR -->
  <nav id="sidenav">
    <div class="snav-logo">C</div>
    <a href="index.html" class="snav-btn"><span>💬</span><span class="tooltip">Bandeja</span></a>
    <a href="pipeline.html" class="snav-btn active"><span>📊</span><span class="tooltip">Pipeline</span></a>
    <a href="leads.html" class="snav-btn"><span>👥</span><span class="tooltip">Leads</span></a>
    <div class="snav-sep"></div>
    <a href="config.html" class="snav-btn"><span>⚙️</span><span class="tooltip">Config</span></a>
    <div class="snav-bottom">
      <div class="snav-btn" id="btn-demo" onclick="toggleDemo()"><span>🎭</span><span class="tooltip">Demo</span></div>
    </div>
  </nav>

  <div id="main">
    <div id="demo-banner" style="display:none">🎭 MODO DEMO — Datos simulados</div>

    <!-- HEADER -->
    <div class="page-header">
      <h1>📊 Pipeline de Ventas</h1>
      <div class="header-stats">
        <div class="stat"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Total</div></div>
        <div class="stat"><div class="stat-num" id="stat-abiertos" style="color:var(--blue)">—</div><div class="stat-label">Abiertos</div></div>
        <div class="stat"><div class="stat-num" id="stat-cerrados" style="color:var(--green)">—</div><div class="stat-label">Cerrados hoy</div></div>
      </div>
      <div class="btn-icon" onclick="loadData()" title="Actualizar">↻</div>
    </div>

    <!-- FILTERS -->
    <div class="filters-bar">
      <span class="filter-chip active" onclick="setTipo('todos',this)">Todos</span>
      <span class="filter-chip" onclick="setTipo('usuario_final',this)">👤 Usuarios</span>
      <span class="filter-chip" onclick="setTipo('mecanico',this)">🔧 Mecánicos</span>
      <span class="filter-chip" onclick="setTipo('refaccionaria',this)">🏪 Refaccionarias</span>
      <select id="filter-asesor" onchange="renderKanban()">
        <option value="">Todos los asesores</option>
      </select>
    </div>

    <!-- KANBAN -->
    <div id="kanban"><div class="loading"><div class="spinner"></div><span>Cargando pipeline...</span></div></div>
  </div>
</div>

<!-- MODAL LEAD DETAIL -->
<div class="modal-overlay" id="modal-lead" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div id="ml-avatar" style="width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#111;flex-shrink:0"></div>
      <div>
        <div id="ml-name" style="font-size:16px;font-weight:700"></div>
        <div id="ml-phone" style="font-size:12px;color:var(--text2)"></div>
      </div>
    </div>
    <div class="badge-row" id="ml-badges"></div>
    <div style="margin:16px 0">
      <div class="modal-section">
        <label>Mover a etapa</label>
        <select id="ml-etapa" onchange="moveLeadStage()"></select>
      </div>
      <div class="modal-section">
        <label>Asesor</label>
        <select id="ml-asesor"></select>
      </div>
      <div class="modal-section">
        <label>Notas rápidas</label>
        <textarea id="ml-notas" rows="3" placeholder="Agrega una nota..."></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>
      <a id="ml-chat-link" href="#" class="btn btn-primary">💬 Ir al chat</a>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL      = 'https://bgpugtgjbfseqwwcwpyd.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJncHVndGdqYmZzZXF3d2N3cHlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NjM4MjEsImV4cCI6MjA5ODEzOTgyMX0.iYp-y00qYWv9uvJX73eAASeKy5qbonXN3Jbwd4qRxPM';
const EMPRESA_ID = '11111111-0000-0000-0000-000000000001';
const HEADERS = {'apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}`,'Content-Type':'application/json','Prefer':'return=representation'};

let _demo = new URLSearchParams(location.search).get('demo')==='1';
let _etapas=[], _leads=[], _asesores=[];
let _tipoFilter='todos';
let _selectedLead=null;

const AVATAR_COLORS=['#c8a951','#3498db','#9b59b6','#1abc9c','#e67e22','#e74c3c','#2ecc71'];
function avatarColor(s){let h=0;for(let c of s)h=(h*31+c.charCodeAt(0))&0xffffffff;return AVATAR_COLORS[Math.abs(h)%AVATAR_COLORS.length];}
function initials(n){if(!n)return '?';const p=n.trim().split(' ');return(p[0][0]+(p[1]?p[1][0]:'')).toUpperCase();}
function relTime(ts){const d=(Date.now()-new Date(ts))/1000;if(d<60)return'ahora';if(d<3600)return`${Math.floor(d/60)}m`;if(d<86400)return`${Math.floor(d/3600)}h`;return`${Math.floor(d/86400)}d`;}

function _sr(s,a,b){let x=s*1664525+1013904223;x=x&0xffffffff;return a+Math.abs(x)%(b-a+1);}

function demoEtapas(){return[
  {id:'et1',nombre:'Pendiente',color:'#888888',icono:'⏳',orden:1},
  {id:'et2',nombre:'Contestado',color:'#3498db',icono:'💬',orden:2},
  {id:'et3',nombre:'Prospecto',color:'#9b59b6',icono:'🎯',orden:3},
  {id:'et4',nombre:'Cotizado',color:'#f39c12',icono:'📋',orden:4},
  {id:'et5',nombre:'Agendado',color:'#1abc9c',icono:'📅',orden:5},
  {id:'et6',nombre:'Cerrado',color:'#2ecc71',icono:'✅',orden:6},
];}
function demoLeads(){
  const nombres=['Carlos Hdz','María López','Roberto Vega','Ana Flores','Luis Torres','Pedro Ruiz','Diana Castro','Miguel Ángel','José Martínez','Elena García','Fernando Ríos','Claudia Mora'];
  const tipos=['usuario_final','mecanico','refaccionaria','usuario_final','mecanico','usuario_final','refaccionaria','mecanico','usuario_final','usuario_final','mecanico','refaccionaria'];
  const etapas=demoEtapas();
  return nombres.map((n,i)=>({
    id:`dl-${i}`,nombre:n,telefono:`+52 33 ${_sr(i*7,1000,9999)} ${_sr(i*13,1000,9999)}`,
    tipo_cliente:tipos[i],
    etapa:etapas[_sr(i*3,0,5)],
    no_leidos:_sr(i*11,0,4)>3?_sr(i*17,1,5):0,
    ultimo_contacto:new Date(Date.now()-_sr(i*5,1,48)*3600000).toISOString(),
    asesor:{nombre:['Luis R.','Karla M.','Diego V.'][_sr(i*9,0,2)]},
    vehiculo_info:['Tsuru 2012','Altima 2018','HiLux 2020','Aveo 2015','RAM 1500 2019','Corolla 2021'][_sr(i*19,0,5)],
    etiquetas_lead:[]
  }));}
function demoAsesores(){return[{id:'a1',nombre:'Luis R.',rol:'admin'},{id:'a2',nombre:'Karla M.',rol:'asesor'},{id:'a3',nombre:'Diego V.',rol:'asesor'}];}

async function sb(path,opts={}){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{headers:HEADERS,...opts});
  if(!r.ok){const e=await r.json();throw new Error(e.message);}
  if(r.status===204)return null;
  return r.json();
}

function toggleDemo(){_demo=!_demo;document.getElementById('demo-banner').style.display=_demo?'block':'none';document.getElementById('btn-demo').style.color=_demo?'var(--gold)':'';init();}

async function init(){
  if(_demo){
    _etapas=demoEtapas();_asesores=demoAsesores();_leads=demoLeads();
  } else {
    try{
      const[e,a,l]=await Promise.all([
        sb(`lp_etapas?empresa_id=eq.${EMPRESA_ID}&order=orden.asc`),
        sb(`lp_asesores?empresa_id=eq.${EMPRESA_ID}&activo=eq.true`),
        sb(`lp_leads?empresa_id=eq.${EMPRESA_ID}&order=updated_at.desc&select=*,etapa:lp_etapas(nombre,color,icono),asesor:lp_asesores(nombre),etiquetas_lead:lp_lead_etiquetas(etiqueta:lp_etiquetas(nombre,color))`)
      ]);
      _etapas=e||[];_asesores=a||[];_leads=l||[];
    }catch(err){
      console.error(err);
      document.getElementById('kanban').innerHTML=`<div style="padding:30px;color:var(--text3);text-align:center">⚠️ Sin conexión.<br><small>Activa demo con 🎭</small></div>`;
      return;
    }
  }
  const asesorSel=document.getElementById('filter-asesor');
  asesorSel.innerHTML='<option value="">Todos los asesores</option>'+_asesores.map(a=>`<option value="${a.nombre}">${a.nombre}</option>`).join('');
  renderStats();
  renderKanban();
  if(_demo)document.getElementById('demo-banner').style.display='block';
}

function renderStats(){
  document.getElementById('stat-total').textContent=_leads.length;
  document.getElementById('stat-abiertos').textContent=_leads.filter(l=>l.etapa?.nombre!=='Cerrado').length;
  document.getElementById('stat-cerrados').textContent=_leads.filter(l=>l.etapa?.nombre==='Cerrado').length;
}

function setTipo(t,el){
  _tipoFilter=t;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderKanban();
}

function getFilteredLeads(){
  let list=_leads;
  if(_tipoFilter!=='todos')list=list.filter(l=>l.tipo_cliente===_tipoFilter);
  const asesor=document.getElementById('filter-asesor')?.value;
  if(asesor)list=list.filter(l=>l.asesor?.nombre===asesor);
  return list;
}

function tipoClass(t){return t==='mecanico'?'tipo-mecanico':t==='refaccionaria'?'tipo-refaccionaria':'tipo-usuario';}
function tipoLabel(t){return t==='mecanico'?'🔧 MEC':t==='refaccionaria'?'🏪 REF':'👤 USR';}

function renderKanban(){
  const list=getFilteredLeads();
  const kanban=document.getElementById('kanban');
  kanban.innerHTML='';
  _etapas.forEach(etapa=>{
    const leads=list.filter(l=>(l.etapa?.nombre||'Pendiente')===etapa.nombre);
    const col=document.createElement('div');
    col.className='kanban-col';
    col.innerHTML=`
      <div class="col-header">
        <span class="col-icono">${etapa.icono||'📋'}</span>
        <span class="col-nombre">${etapa.nombre}</span>
        <span class="col-count" style="background:${etapa.color}22;color:${etapa.color}">${leads.length}</span>
      </div>
      <div class="col-body" id="col-${etapa.id}">
        ${leads.length?leads.map(l=>cardHTML(l)).join(''):'<div style="text-align:center;padding:20px;font-size:12px;color:var(--text3)">Sin leads</div>'}
      </div>
    `;
    kanban.appendChild(col);
  });
}

function cardHTML(l){
  const col=avatarColor(l.nombre||l.telefono||'?');
  const ini=initials(l.nombre||l.telefono);
  const veh=l.vehiculo_info?`<div style="font-size:10px;color:var(--text3);margin-top:2px">🚗 ${l.vehiculo_info}</div>`:'';
  return`<div class="lead-card" onclick="openLeadModal('${l.id}')">
    ${(l.no_leidos||0)>0?`<div class="card-unread">${l.no_leidos}</div>`:''}
    <div class="card-avatar" style="background:${col}">${ini}</div>
    <div style="overflow:hidden">
      <div class="card-name">${l.nombre||l.telefono}</div>
      <div class="card-phone">${l.telefono||''}</div>
    </div>
    <div class="card-clear"></div>
    ${veh}
    <div class="card-footer" style="margin-top:6px">
      <span class="tipo-icon ${tipoClass(l.tipo_cliente)}">${tipoLabel(l.tipo_cliente)}</span>
      <span class="card-time">${l.ultimo_contacto?relTime(l.ultimo_contacto):''}</span>
      ${l.asesor?.nombre?`<span class="card-asesor">${l.asesor.nombre}</span>`:''}
    </div>
  </div>`;
}

function openLeadModal(id){
  _selectedLead=_leads.find(l=>l.id===id);
  if(!_selectedLead)return;
  const l=_selectedLead;
  const col=avatarColor(l.nombre||l.telefono||'?');
  document.getElementById('ml-avatar').style.background=col;
  document.getElementById('ml-avatar').textContent=initials(l.nombre||l.telefono);
  document.getElementById('ml-name').textContent=l.nombre||'Sin nombre';
  document.getElementById('ml-phone').textContent=l.telefono||'';
  document.getElementById('ml-badges').innerHTML=`
    <span class="badge" style="border-color:${l.etapa?.color||'#888'};color:${l.etapa?.color||'#888'}">${l.etapa?.icono||''} ${l.etapa?.nombre||'—'}</span>
    <span class="badge" style="border-color:#555;color:#aaa">${tipoLabel(l.tipo_cliente)}</span>
    ${l.asesor?.nombre?`<span class="badge" style="border-color:#555;color:#aaa">👤 ${l.asesor.nombre}</span>`:''}
  `;
  document.getElementById('ml-etapa').innerHTML=_etapas.map(e=>`<option value="${e.id}" ${e.nombre===l.etapa?.nombre?'selected':''}>${e.icono} ${e.nombre}</option>`).join('');
  document.getElementById('ml-asesor').innerHTML='<option value="">Sin asignar</option>'+_asesores.map(a=>`<option value="${a.id}" ${l.asesor?.nombre===a.nombre?'selected':''}>${a.nombre}</option>`).join('');
  document.getElementById('ml-notas').value=l.notas||'';
  document.getElementById('ml-chat-link').href=`index.html?lead=${l.id}${_demo?'&demo=1':''}`;
  document.getElementById('modal-lead').style.display='flex';
}

async function moveLeadStage(){
  if(!_selectedLead||_demo)return;
  const etapaId=document.getElementById('ml-etapa').value;
  try{ await sb(`lp_leads?id=eq.${_selectedLead.id}`,{method:'PATCH',body:JSON.stringify({etapa_id:etapaId})}); }
  catch(e){console.error(e);}
}

function closeModal(){document.getElementById('modal-lead').style.display='none';}
async function loadData(){init();}

if(_demo)document.getElementById('demo-banner').style.display='block';
init();
</script>
